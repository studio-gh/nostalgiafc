<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia FC ⚽ Edição de Ouro V12</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=Georgia:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                        anton: ['Anton', 'Arial Black', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'monospace'],
                        serif: ['Georgia', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #1A1A1A;
            color: #1A1A1A;
            font-family: 'Arial', sans-serif;
        }
        /* Efeito de papel couchê envelhecido texturizado de banca de jornal */
        .bg-creme-retrô { background-color: #F4F1EA; }
        .text-obsidian { color: #1A1A1A; }
        .bg-obsidian { background-color: #1A1A1A; }
        
        /* Custom Scrollbar Retro Terminais */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1A1A1A; }
        ::-webkit-scrollbar-thumb { background: #F59E0B; border: 2px solid #1A1A1A; }
    </style>
</head>
<body class="bg-obsidian antialiased text-obsidian select-none">

    <div id="app-root"></div>

    <script type="text/babel">
        // Importação lógica mockada dos componentes que geramos nos passos anteriores
        // Nota: Substitua pelas chamadas reais dos arquivos locais ou mantenha este escopo para testes imediatos de navegador.
        
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // APP CENTRAL - MÁQUINA DE ESTADOS V12
        // ==========================================
        function NostalgiaFCApp() {
            // Fases do Loop: 'HOME' | 'LIGAS' | 'FORMACAO' | 'DRAFT' | 'VESTIARIO' | 'TRANSMISSAO' | 'POSTER'
            const [telaAtual, setTelaAtual] = useState('HOME');
            
            // Dados da Campanha e Configurações de Gameplay
            const [ligasSelecionadas, setLigasSelecionadas] = useState([]);
            const [formacaoTatica, setFormacaoTatica] = useState('4-3-3');
            const [modoManager, setModoManager] = useState(false); // Notas visíveis vs ocultas no card
            const [elencoJogador, setElencoJogador] = useState([]);
            const [indiceDraftRodada, setIndiceDraftRodada] = useState(0);
            
            // Estado Consolidado dos Resultados para Alimentação do Pôster
            const [dadosFinaisCampanha, setDadosFinaisCampanha] = useState({
                timeNome: "NOSTALGIA FC",
                vitorias: 0,
                empates: 0,
                derrotas: 0,
                artilheiro: "Ninguém",
                gols: 0,
                mvp: "Ninguém"
            });

            // AÇÃO: Inicializar fluxo do Draft
            const handleIniciarJogo = () => {
                setTelaAtual('LIGAS');
            };

            // AÇÃO: Confirmar Ligas e avançar para Formação
            const handleConfirmarLigas = (ligas) => {
                if(ligas.length === 0) {
                    alert('Selecione pelo menos uma liga clássica para rodar os dados!');
                    return;
                }
                setLigasSelecionadas(ligas);
                setTelaAtual('FORMACAO');
            };

            // AÇÃO: Confirmar Formação e Inicializar o Draft Real
            const handleConfirmarFormacao = (tatica, managerMode) => {
                setFormacaoTatica(tatica);
                setModoManager(managerMode);
                setElencoJogador([]);
                setIndiceDraftRodada(0);
                setTelaAtual('DRAFT');
            };

            // Fallback temporário de simulação de avanço do Draft até o Vestiário
            const simularRecrutamentoJogador = (jogadorFake) => {
                const novoElenco = [...elencoJogador, jogadorFake];
                setElencoJogador(novoElenco);
                
                if (novoElenco.length >= 11) {
                    setTelaAtual('VESTIARIO');
                } else {
                    setIndiceDraftRodada(indiceDraftRodada + 1);
                }
            };

            // AÇÃO: Ir para a Engine de Partida (Simulador Transmissão)
            const handleIniciarCampanha = () => {
                setTelaAtual('TRANSMISSAO');
            };

            // AÇÃO: Concluir Copa e enviar metadados das crônicas para o Canvas do Pôster
            const handleFinalizarCampanha = (statsFinais) => {
                setDadosFinaisCampanha(statsFinais);
                setTelaAtual('POSTER');
            };

            // AÇÃO: Reset Total e Limpeza de Cache da Máquina de Estados (Voltar ao Início)
            const handleResetTotal = () => {
                setLigasSelecionadas([]);
                setElencoJogador([]);
                setIndiceDraftRodada(0);
                setTelaAtual('HOME');
            };

            return (
                <div class="min-h-screen flex flex-col bg-obsidian text-obsidian font-mono select-none">
                    
                    <header class="w-full bg-creme-retrô border-b-8 border-black p-4 flex flex-col sm:flex-row items-center justify-between shadow-[0_4px_0_0_#F59E0B]">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-black flex items-center justify-center text-[#F4F1EA] font-anton text-2xl border-2 border-amber-500 rounded-sm">
                                ⚽
                            </div>
                            <div>
                                <h1 class="font-anton text-3xl italic tracking-tighter leading-none text-black">NOSTALGIA FC</h1>
                                <p class="text-[10px] font-mono tracking-widest text-zinc-600 uppercase font-bold">Draft de Ouro • Era Pré-VAR</p>
                            </div>
                        </div>
                        <div class="mt-2 sm:mt-0 bg-black text-[#F4F1EA] text-xs px-3 py-1 font-mono uppercase tracking-widest border border-amber-500">
                            Fase Atual: <span class="text-amber-400 font-bold">{telaAtual}</span>
                        </div>
                    </header>

                    <main class="flex-grow flex items-center justify-center p-4">
                        
                        {/* RENDER POLIMÓRFICO DE TELAS */}
                        {telaAtual === 'HOME' && (
                            <div class="w-full max-w-xl bg-creme-retrô p-8 border-4 border-black shadow-[8px_8px_0px_0px_#F59E0B] text-center">
                                <h2 class="font-anton text-4xl uppercase tracking-tight text-black mb-4">MANTENHA A MEMÓRIA ALIMENTADA</h2>
                                <p class="font-serif text-sm italic text-zinc-700 mb-6 leading-relaxed">
                                    "Monte seu esquadrão imortal carta por carta, encare ligas nacionais clássicas e dispute o tiro curto da Copa Nostalgia na gloriosa era pré-VAR de 1990 a 2016."
                                </p>
                                <button 
                                    onClick={handleIniciarJogo}
                                    class="w-full bg-black text-amber-400 font-anton text-xl py-4 uppercase border-2 border-black tracking-wider shadow-[4px_4px_0px_0px_#B91C1C] hover:bg-zinc-900 hover:text-amber-300 transition-all active:translate-y-0.5"
                                >
                                    🎮 Entrar no Vestiário / Iniciar Draft
                                </button>
                            </div>
                        )}

                        {telaAtual === 'LIGAS' && (
                            <div class="w-full max-w-xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#B91C1C]">
                                <h2 class="font-anton text-2xl uppercase tracking-tight text-black mb-3 border-b-2 border-black pb-1">⚡ PASSO 1: FILTRAR O REDUTO</h2>
                                <p class="text-xs text-zinc-600 mb-4">Escolha as ligas nacionais históricas que entrarão na roleta de sorteios.</p>
                                
                                <div class="grid grid-cols-2 gap-2 mb-6 font-bold text-xs">
                                    {['Brasileirão Retrô', 'Serie A Tim (90s)', 'La Liga Clássica', 'Premier League Gold'].map(liga => (
                                        <label key={liga} class="flex items-center gap-2 p-2.5 bg-stone-200 border border-zinc-400 cursor-pointer hover:bg-stone-300 transition-all rounded-sm">
                                            <input 
                                                type="checkbox" 
                                                checked={ligasSelecionadas.includes(liga)}
                                                onChange={(e) => {
                                                    if(e.target.checked) setLigasSelecionadas([...ligasSelecionadas, liga]);
                                                    else setLigasSelecionadas(ligasSelecionadas.filter(l => l !== liga));
                                                }}
                                                class="accent-black w-4 h-4"
                                            />
                                            <span>{liga}</span>
                                        </label>
                                    ))}
                                </div>

                                <button 
                                    onClick={() => handleConfirmarLigas(ligasSelecionadas)}
                                    class="w-full bg-zinc-800 text-stone-100 p-3 font-anton text-md uppercase tracking-wide border-2 border-black shadow-[3px_3px_0px_0px_#000] hover:bg-zinc-700"
                                >
                                    Avançar para Tática ➔
                                </button>
                            </div>
                        )}

                        {telaAtual === 'FORMACAO' && (
                            <div class="w-full max-w-xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#15803D]">
                                <h2 class="font-anton text-2xl uppercase tracking-tight text-black mb-2 border-b-2 border-black pb-1">📋 PASSO 2: FILOSOFIA TÁTICA</h2>
                                <p class="text-xs text-zinc-600 mb-4">Escolha a prancheta e defina as regras de visualização do seu painel técnico.</p>
                                
                                <div class="mb-4">
                                    <label class="block text-xs font-bold uppercase text-zinc-700 mb-1">Esquema Base:</label>
                                    <select 
                                        value={formacaoTatica} 
                                        onChange={(e) => setFormacaoTatica(e.target.value)}
                                        class="w-full p-2.5 bg-white border-2 border-black font-mono font-bold text-sm"
                                    >
                                        <option value="4-3-3">4-3-3 Tradicional (Ofensivo)</option>
                                        <option value="4-4-2">4-4-2 Equilibrado (Copa 94)</option>
                                        <option value="3-5-2">3-5-2 Ala Europeu (Scolari Era)</option>
                                    </select>
                                </div>

                                <div class="mb-6 p-3 bg-stone-200 border border-zinc-400">
                                    <label class="flex items-center gap-3 cursor-pointer">
                                        <input 
                                            type="checkbox" 
                                            checked={modoManager} 
                                            onChange={(e) => setModoManager(e.target.checked)}
                                            class="accent-black w-5 h-5"
                                        />
                                        <div>
                                            <span class="block text-xs font-anton uppercase text-black">Modo Manager Ativo</span>
                                            <span class="text-[10px] text-zinc-600 block leading-tight">Oculta notas numéricas (OVR) dos cards durante as janelas de recrutamento, forçando leitura puramente histórica!</span>
                                        </div>
                                    </label>
                                </div>

                                <button 
                                    onClick={() => handleConfirmarFormacao(formacaoTatica, modoManager)}
                                    class="w-full bg-green-700 text-stone-100 p-3 font-anton text-md uppercase tracking-wide border-2 border-black shadow-[3px_3px_0px_0px_#000] hover:bg-green-600"
                                >
                                    Abrir Roleta de Clubes ➔
                                </button>
                            </div>
                        )}

                        {telaAtual === 'DRAFT' && (
                            <div class="w-full max-w-2xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#F59E0B]">
                                <div class="flex justify-between items-center mb-2 border-b-2 border-black pb-1">
                                    <h2 class="font-anton text-2xl uppercase tracking-tight text-black">🎴 DRAFT DE OURO ({elencoJogador.length}/11)</h2>
                                    <span class="text-xs bg-black text-white px-2 py-0.5 font-bold">RODADA {indiceDraftRodada + 1}</span>
                                </div>
                                <p class="text-xs text-zinc-600 mb-4">Escolha cirúrgica "Carta por Carta". O sistema sorteou o esquadrão clássico abaixo. Recrute um craque para compor seu XI titular.</p>
                                
                                <div class="bg-stone-900 text-amber-400 p-4 font-anton text-center tracking-widest text-xl uppercase mb-6 border-2 border-black">
                                    🎰 CLUBE SORTEADO: MILAN 1994
                                </div>

                                {/* Placeholder tático do componente CardJogador simulando o recrutamento rápido */}
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                                    <div onClick={() => simularRecrutamentoJogador({nome: 'Maldini', rating: 94, posicao: 'DEF'})} class="border-2 border-black p-3 bg-white hover:bg-amber-50 cursor-pointer transition-all shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                        <span class="text-[10px] uppercase font-bold text-zinc-500 block">Zagueiro / Lateral</span>
                                        <span class="font-anton text-lg text-black block">PAOLO MALDINI</span>
                                        {!modoManager && <span class="text-xs font-mono bg-amber-400 font-black px-1.5 py-0.5 rounded-sm">OVR: 94</span>}
                                        <span class="text-[10px] block text-zinc-600 italic mt-1">Trait: "Paredão Analógico"</span>
                                    </div>
                                    <div onClick={() => simularRecrutamentoJogador({nome: 'Savicevic', rating: 89, posicao: 'MID'})} class="border-2 border-black p-3 bg-white hover:bg-amber-50 cursor-pointer transition-all shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                        <span class="text-[10px] uppercase font-bold text-zinc-500 block">Meia Atacante</span>
                                        <span class="font-anton text-lg text-black block">DEJAN SAVIĆEVIĆ</span>
                                        {!modoManager && <span class="text-xs font-mono bg-amber-400 font-black px-1.5 py-0.5 rounded-sm">OVR: 89</span>}
                                        <span class="text-[10px] block text-zinc-600 italic mt-1">Trait: "Gênio Imprevisível"</span>
                                    </div>
                                </div>
                                
                                <p class="text-[10px] text-center text-zinc-500 italic">Clique sobre o card do jogador para simular o recrutamento tático imediato.</p>
                            </div>
                        )}

                        {telaAtual === 'VESTIARIO' && (
                            <div class="w-full max-w-xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#4B5563]">
                                <h2 class="font-anton text-2xl uppercase tracking-tight text-black mb-2 border-b-2 border-black pb-1">🛡️ VESTIÁRIO E EXAME MÉDICO</h2>
                                <p class="text-xs text-zinc-600 mb-4">Seu elenco titular está fechado. Revise as condições físicas e a barra de moral antes de iniciar a campanha.</p>
                                
                                <div class="space-y-2 max-h-48 overflow-y-auto pr-2 mb-6">
                                    <div class="flex justify-between bg-white p-2 border border-black text-xs font-bold">
                                        <span>🧤 ROMÁRIO (ST)</span>
                                        <span class="text-green-700">⚡ ENERGIA: 100% (SETINHA ⬆)</span>
                                    </div>
                                    <div class="flex justify-between bg-white p-2 border border-black text-xs font-bold">
                                        <span>🛡️ MALDINI (DEF)</span>
                                        <span class="text-green-700">⚡ ENERGIA: 98% (SETINHA ➡)</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleIniciarCampanha}
                                    class="w-full bg-zinc-950 text-amber-400 p-3.5 font-anton text-md uppercase tracking-wider border-2 border-black shadow-[4px_4px_0px_0px_#000] hover:bg-zinc-800"
                                >
                                    🏟️ Entrar em Campo / Iniciar Copa Nostalgia
                                </button>
                            </div>
                        )}

                        {telaAtual === 'TRANSMISSAO' && (
                            <div class="w-full max-w-2xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#B91C1C]">
                                <h2 class="font-anton text-2xl uppercase tracking-tight text-black mb-1">📺 TRANSMISSÃO VIVA RETRÔ</h2>
                                <p class="text-xs text-zinc-600 mb-4">Motor minuto a minuto em execução. Simulando torneio de tiro curto (Campanha do Ouro).</p>
                                
                                <div class="bg-black text-stone-100 p-4 font-mono text-center rounded-sm mb-6">
                                    <div class="text-amber-400 font-anton tracking-widest text-xl">COPA NOSTALGIA • GRANDE FINAL</div>
                                    <div class="text-2xl font-black my-2">MEU TIME 2 × 1 BAYERN DE MUNIQUE</div>
                                    <div class="text-[11px] text-zinc-400">⏱️ 90' MINUTOS ENCERRADOS • APITO FINAL!</div>
                                </div>

                                <div class="p-3 bg-stone-200 border border-zinc-400 text-xs space-y-1 mb-6">
                                    <div class="font-bold text-zinc-800">📋 Crônica Estatística da Copa:</div>
                                    <div>⚽ Artilheiro da Competição: <span class="font-bold text-black">Romário (12 Gols)</span></div>
                                    <div>🏆 Craque do Torneio (MVP Global): <span class="font-bold text-black">Paolo Maldini</span></div>
                                </div>

                                <button 
                                    onClick={() => handleFinalizarCampanha({
                                        timeNome: "Meu Elenco Imortal",
                                        vitorias: 6,
                                        empates: 1,
                                        derrotas: 0,
                                        artilheiro: "Romário",
                                        gols: 12,
                                        mvp: "Paolo Maldini"
                                    })}
                                    class="w-full bg-amber-500 text-black p-3 font-anton text-md uppercase tracking-wide border-2 border-black shadow-[3px_3px_0px_0px_#000] hover:bg-amber-400"
                                >
                                    🏆 Erguer Taça e Ver Pôster Comercial
                                </button>
                            </div>
                        )}

                        {telaAtual === 'POSTER' && (
                            /* Integração Direta Interoperável com o Módulo Poster.js */
                            <div class="w-full flex justify-center">
                                <div class="w-full max-w-xl bg-creme-retrô p-6 border-4 border-black shadow-[8px_8px_0px_0px_#1A1A1A] text-center">
                                    <h2 class="font-anton text-2xl text-black uppercase mb-4">PÔSTER DE REVISTA GERADO</h2>
                                    <div class="p-4 bg-white border-2 border-dashed border-zinc-400 font-mono text-xs text-left space-y-2 mb-6">
                                        <p class="font-bold text-center border-b border-black pb-1">📊 METADADOS PARA EXPORTAÇÃO CANVAS</p>
                                        <p><strong>Clube:</strong> {dadosFinaisCampanha.timeNome}</p>
                                        <p><strong>Resultados:</strong> {dadosFinaisCampanha.vitorias}V - {dadosFinaisCampanha.empates}E - {dadosFinaisCampanha.derrotas}D</p>
                                        <p><strong>Artilheiro Premium:</strong> {dadosFinaisCampanha.artilheiro} ({dadosFinaisCampanha.gols} Gols)</p>
                                        <p><strong>Melhor em Campo:</strong> {dadosFinaisCampanha.mvp}</p>
                                    </div>
                                    <button 
                                        onClick={handleResetTotal}
                                        class="w-full bg-black text-amber-400 font-anton text-md py-3 uppercase tracking-wider"
                                    >
                                        ↩️ Novo Campeonato / Resetar Loop
                                    </button>
                                </div>
                            </div>
                        )}

                    </main>

                    <footer class="w-full bg-white border-t-4 border-black p-3 text-center bg-zinc-100 shadow-[0_-4px_0_0_#B91C1C]">
                        <span class="font-anton text-md tracking-widest text-black uppercase shadow-sm">
                            SIGA @NOSTALGIA.F.C — PROJETO ORIGINAL CONCLUÍDO V12
                        </span>
                    </footer>

                </div>
            );
        }

        // Renderização tática na árvore DOM
        const root = ReactDOM.createRoot(document.getElementById('app-root'));
        root.render(<NostalgiaFCApp />);
    </script>
</body>
</html>
